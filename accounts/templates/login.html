{% extends "base.html" %}

{% block title %} Login to DocuFlow{% endblock %}

{% block content %}
<h2>Login to DocuFlow</h2>

<form method="POST">
    {% csrf_token %}

    {{ form.as_p }}
    <button type="submit">
        Log In
    </button>
</form>

<p>New here? <a href="{% url 'accounts:register' %}">Create an account</a></p>
{% endblock %}
